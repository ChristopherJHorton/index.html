<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Keg – Crash Kit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap');
  :root {
    --keg-dark: #1a2e2a;
    --keg-gold: #b8943f;
    --keg-gold-light: #d4ab5a;
    --keg-cream: #f5f0e8;
    --keg-white: #faf8f4;
    --keg-border: #ddd5c0;
    --keg-red: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--keg-cream); color: var(--keg-dark); min-height: 100vh; font-size: 16px; }

  /* HEADER */
  header { background: var(--keg-dark); color: var(--keg-cream); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; line-height: 1.1; }
  header h1 span { color: var(--keg-gold); font-size: 0.6rem; font-family: 'Source Sans 3', sans-serif; display: block; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 300; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .table-badge { background: var(--keg-gold); color: var(--keg-dark); font-weight: 700; font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; cursor: pointer; letter-spacing: 0.05em; }
  .edit-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(184,148,63,0.4); color: var(--keg-gold); font-size: 0.7rem; padding: 4px 9px; border-radius: 20px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }

  /* TABLE SELECTOR */
  .table-selector { background: var(--keg-dark); padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 8px; border-bottom: 2px solid var(--keg-gold); }
  .table-selector label { color: var(--keg-gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .table-input-row { display: flex; gap: 8px; align-items: center; }
  .table-number-input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(184,148,63,0.4); border-radius: 8px; color: var(--keg-cream); font-size: 1.1rem; font-family: 'Source Sans 3', sans-serif; font-weight: 600; letter-spacing: 0.05em; }
  .table-number-input:focus { outline: none; border-color: var(--keg-gold); background: rgba(255,255,255,0.12); }
  .table-number-input::placeholder { color: rgba(245,240,232,0.25); font-weight: 300; }
  .table-confirm-btn { background: var(--keg-gold); color: var(--keg-dark); border: none; padding: 10px 18px; border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; white-space: nowrap; }

  /* TABS */
  .tabs { display: flex; background: var(--keg-dark); overflow-x: auto; scrollbar-width: none; border-bottom: 2px solid var(--keg-gold); position: sticky; top: 53px; z-index: 99; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 16px; color: rgba(245,240,232,0.5); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; flex-shrink: 0; }
  .tab.active { color: var(--keg-gold); border-bottom-color: var(--keg-gold); }
  .tab.misc-tab { color: rgba(184,148,63,0.7); }
  .tab.misc-tab.active { color: var(--keg-gold); }

  /* MENU SECTION */
  .menu-section { padding: 12px 12px 0; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--keg-gold); text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 0 6px; border-bottom: 1px solid var(--keg-border); margin-bottom: 8px; }

  /* MENU ITEMS */
  .menu-item { display: flex; align-items: center; background: var(--keg-white); border: 1px solid var(--keg-border); border-radius: 8px; margin-bottom: 7px; padding: 10px 12px; gap: 10px; cursor: pointer; transition: all 0.15s; }
  .menu-item:active { transform: scale(0.98); background: #f0ead8; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; font-size: 0.9rem; color: var(--keg-dark); }
  .item-desc { font-size: 0.72rem; color: #7a7060; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-price { font-weight: 700; color: var(--keg-dark); font-size: 0.95rem; white-space: nowrap; }
  .add-btn { background: var(--keg-dark); color: var(--keg-gold); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
  .add-btn:active { background: var(--keg-gold); color: var(--keg-dark); transform: scale(0.88); }
  .add-btn.tapped { background: var(--keg-gold) !important; color: var(--keg-dark) !important; transform: scale(0.88); }
  .edit-item-btn { background: transparent; border: 1px solid var(--keg-border); color: #aaa; width: 26px; height: 26px; border-radius: 50%; font-size: 0.7rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

  /* MISC TAB */
  .misc-section { padding: 12px; }
  .misc-form { background: var(--keg-white); border: 1px solid var(--keg-border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .misc-form label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--keg-gold); margin-bottom: 5px; margin-top: 10px; }
  .misc-form label:first-child { margin-top: 0; }
  .misc-input { width: 100%; padding: 10px 12px; border: 1px solid var(--keg-border); border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 1rem; background: var(--keg-cream); color: var(--keg-dark); }
  .misc-input:focus { outline: none; border-color: var(--keg-gold); }
  .misc-add-btn { width: 100%; margin-top: 14px; background: var(--keg-dark); color: var(--keg-gold); border: none; padding: 12px; border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; text-transform: uppercase; }
  .misc-add-btn:active { background: var(--keg-gold); color: var(--keg-dark); }
  .misc-history { margin-top: 4px; }
  .misc-history-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 8px; }
  .misc-saved-item { display: flex; align-items: center; background: var(--keg-white); border: 1px solid var(--keg-border); border-radius: 8px; padding: 10px 12px; margin-bottom: 7px; gap: 10px; cursor: pointer; }
  .misc-saved-item:active { background: #f0ead8; }
  .misc-del-btn { background: transparent; border: none; color: #ccc; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; flex-shrink: 0; }
  .misc-del-btn:active { color: var(--keg-red); }

  /* ORDER PANEL */
  .order-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--keg-dark); color: var(--keg-cream); border-top: 2px solid var(--keg-gold); z-index: 200; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
  .order-panel.collapsed { max-height: 56px; }
  .order-toggle { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; flex-shrink: 0; }
  .order-toggle-left { display: flex; align-items: center; gap: 10px; }
  .order-count { background: var(--keg-gold); color: var(--keg-dark); font-weight: 700; font-size: 0.75rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .order-label { font-family: 'Playfair Display', serif; font-size: 1rem; letter-spacing: 0.05em; }
  .order-subtotal { font-weight: 700; color: var(--keg-gold); font-size: 1rem; }
  .chevron { color: var(--keg-gold); font-size: 1rem; transition: transform 0.3s; }
  .order-panel:not(.collapsed) .chevron { transform: rotate(180deg); }
  .order-items { overflow-y: auto; flex: 1; padding: 0 12px 8px; }
  .order-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid rgba(245,240,232,0.1); }
  .order-item-name { flex: 1; font-size: 0.88rem; }
  .order-item-price { color: var(--keg-gold); font-weight: 600; font-size: 0.88rem; white-space: nowrap; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn { background: rgba(255,255,255,0.1); border: none; color: var(--keg-cream); width: 26px; height: 26px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-btn:active { background: var(--keg-gold); color: var(--keg-dark); }
  .qty-num { font-size: 0.9rem; font-weight: 700; min-width: 18px; text-align: center; }
  .order-totals { border-top: 1px solid rgba(245,240,232,0.15); padding: 10px 12px; flex-shrink: 0; }
  .total-row { display: flex; justify-content: space-between; font-size: 0.88rem; padding: 3px 0; }
  .total-row.grand { font-size: 1.1rem; font-weight: 700; color: var(--keg-gold); padding-top: 6px; border-top: 1px solid rgba(184,148,63,0.3); margin-top: 4px; }
  .print-btn { margin: 8px 12px 4px; background: var(--keg-gold); color: var(--keg-dark); border: none; padding: 14px; border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; width: calc(100% - 24px); flex-shrink: 0; }
  .print-btn:active { background: var(--keg-gold-light); }
  .clear-btn { margin: 0 12px 10px; background: transparent; color: rgba(245,240,232,0.4); border: 1px solid rgba(245,240,232,0.15); padding: 8px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; width: calc(100% - 24px); flex-shrink: 0; letter-spacing: 0.05em; font-family: 'Source Sans 3', sans-serif; }
  .bottom-spacer { height: 60px; }

  /* RECEIPT MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .receipt-box { background: white; border-radius: 8px; max-width: 340px; width: 100%; max-height: 85vh; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; }
  .receipt-inner { padding: 20px; }
  .receipt-header { text-align: center; border-bottom: 1px dashed #999; padding-bottom: 12px; margin-bottom: 12px; }
  .receipt-header h2 { font-size: 15px; font-weight: bold; letter-spacing: 1px; }
  .receipt-header p { font-size: 11px; color: #555; margin-top: 2px; }
  .receipt-line { display: flex; justify-content: space-between; margin: 4px 0; }
  .receipt-line .rname { flex: 1; padding-right: 8px; }
  .receipt-divider { border: none; border-top: 1px dashed #999; margin: 10px 0; }
  .receipt-total-row { display: flex; justify-content: space-between; font-weight: bold; margin: 4px 0; }
  .receipt-grand { font-size: 15px; margin-top: 6px; }
  .receipt-footer { text-align: center; margin-top: 14px; font-size: 11px; color: #777; border-top: 1px dashed #999; padding-top: 10px; }
  .receipt-actions { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #eee; }
  .receipt-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
  .btn-print { background: var(--keg-dark); color: white; }
  .btn-close { background: #eee; color: #333; }

  /* PASSWORD MODAL */
  .pw-box { background: var(--keg-dark); border: 1px solid var(--keg-gold); border-radius: 12px; padding: 24px; max-width: 300px; width: 100%; }
  .pw-box h3 { font-family: 'Playfair Display', serif; color: var(--keg-gold); text-align: center; margin-bottom: 6px; font-size: 1.1rem; }
  .pw-box p { color: rgba(245,240,232,0.5); font-size: 0.78rem; text-align: center; margin-bottom: 16px; }
  .pw-input { width: 100%; padding: 12px; border: 1px solid rgba(184,148,63,0.4); border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--keg-cream); font-size: 1rem; font-family: 'Source Sans 3', sans-serif; text-align: center; letter-spacing: 0.2em; }
  .pw-input:focus { outline: none; border-color: var(--keg-gold); }
  .pw-error { color: #e74c3c; font-size: 0.78rem; text-align: center; margin-top: 8px; min-height: 18px; }
  .pw-actions { display: flex; gap: 8px; margin-top: 14px; }
  .pw-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; font-family: 'Source Sans 3', sans-serif; }
  .btn-unlock { background: var(--keg-gold); color: var(--keg-dark); }
  .btn-cancel { background: rgba(255,255,255,0.1); color: var(--keg-cream); }

  /* MENU EDITOR MODAL */
  .editor-box { background: var(--keg-cream); border-radius: 12px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
  .editor-header { background: var(--keg-dark); padding: 16px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .editor-header h3 { font-family: 'Playfair Display', serif; color: var(--keg-gold); font-size: 1rem; }
  .editor-close { background: transparent; border: none; color: rgba(245,240,232,0.5); font-size: 1.3rem; cursor: pointer; }
  .editor-body { padding: 16px; }
  .editor-cat { margin-bottom: 20px; }
  .editor-cat-title { font-family: 'Playfair Display', serif; color: var(--keg-gold); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--keg-border); }
  .editor-item-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; background: var(--keg-white); border: 1px solid var(--keg-border); border-radius: 6px; padding: 8px 10px; }
  .editor-item-name { flex: 1; font-size: 0.85rem; color: var(--keg-dark); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .editor-price-input { width: 70px; padding: 5px 8px; border: 1px solid var(--keg-border); border-radius: 5px; font-size: 0.9rem; font-family: 'Source Sans 3', sans-serif; background: var(--keg-cream); color: var(--keg-dark); text-align: right; flex-shrink: 0; }
  .editor-price-input:focus { outline: none; border-color: var(--keg-gold); }
  .editor-del-btn { background: transparent; border: none; color: #ccc; font-size: 1rem; cursor: pointer; flex-shrink: 0; padding: 2px 4px; }
  .editor-del-btn:active { color: var(--keg-red); }
  .add-item-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-item-name-input { flex: 1; padding: 7px 10px; border: 1px dashed var(--keg-border); border-radius: 6px; font-size: 0.85rem; font-family: 'Source Sans 3', sans-serif; background: var(--keg-white); color: var(--keg-dark); }
  .add-item-price-input { width: 70px; padding: 7px 8px; border: 1px dashed var(--keg-border); border-radius: 6px; font-size: 0.85rem; font-family: 'Source Sans 3', sans-serif; background: var(--keg-white); color: var(--keg-dark); text-align: right; }
  .add-item-name-input:focus, .add-item-price-input:focus { outline: none; border-color: var(--keg-gold); border-style: solid; }
  .add-item-btn { background: var(--keg-dark); color: var(--keg-gold); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .editor-save-btn { width: 100%; background: var(--keg-gold); color: var(--keg-dark); border: none; padding: 14px; border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; margin-top: 8px; text-transform: uppercase; }
  .editor-saved-msg { text-align: center; color: #27ae60; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }


  /* SEARCH BAR */
  .search-bar-wrap { background: var(--keg-dark); padding: 8px 12px 10px; position: sticky; top: 100px; z-index: 98; border-bottom: 1px solid rgba(184,148,63,0.2); }
  .search-input { width: 100%; padding: 9px 14px 9px 36px; background: rgba(255,255,255,0.08); border: 1px solid rgba(184,148,63,0.3); border-radius: 20px; color: var(--keg-cream); font-family: 'Source Sans 3', sans-serif; font-size: 0.9rem; }
  .search-input:focus { outline: none; border-color: var(--keg-gold); background: rgba(255,255,255,0.12); }
  .search-input::placeholder { color: rgba(245,240,232,0.3); }
  .search-wrap-inner { position: relative; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: rgba(184,148,63,0.6); font-size: 0.9rem; pointer-events: none; }
  .search-clear { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: rgba(245,240,232,0.4); background: none; border: none; font-size: 1rem; cursor: pointer; display: none; }
  .search-results-label { color: rgba(184,148,63,0.7); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 12px 0; }

  /* EDITOR SEARCH */
  .editor-search-wrap { padding: 12px 16px 8px; background: var(--keg-cream); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--keg-border); }
  .editor-search-inner { position: relative; }
  .editor-search-input { width: 100%; padding: 9px 14px 9px 34px; background: var(--keg-white); border: 1px solid var(--keg-border); border-radius: 20px; font-family: 'Source Sans 3', sans-serif; font-size: 0.9rem; color: var(--keg-dark); }
  .editor-search-input:focus { outline: none; border-color: var(--keg-gold); }
  .editor-search-input::placeholder { color: #bbb; }
  .editor-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 0.85rem; pointer-events: none; }


  /* COMP SYSTEM */
  .comp-section { border-top: 1px solid rgba(245,240,232,0.15); padding: 8px 12px; flex-shrink: 0; }
  .comp-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(184,148,63,0.7); margin-bottom: 6px; }
  .comp-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
  .comp-btn { flex: 1; min-width: 0; padding: 7px 4px; background: rgba(255,255,255,0.06); border: 1px solid rgba(184,148,63,0.25); border-radius: 6px; color: rgba(245,240,232,0.7); font-size: 0.72rem; font-family: 'Source Sans 3', sans-serif; cursor: pointer; text-align: center; transition: all 0.15s; white-space: nowrap; }
  .comp-btn:active { transform: scale(0.95); }
  .comp-btn.active { background: rgba(192,57,43,0.25); border-color: #e74c3c; color: #e74c3c; font-weight: 700; }
  .comp-btn.dessert-btn.active { background: rgba(184,148,63,0.2); border-color: var(--keg-gold); color: var(--keg-gold); font-weight: 700; }
  .comp-active-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 0; font-size: 0.78rem; }
  .comp-active-label { color: #e74c3c; font-weight: 600; }
  .comp-remove { background: transparent; border: none; color: rgba(245,240,232,0.3); font-size: 0.8rem; cursor: pointer; padding: 2px 4px; }

  @media print {
    @page {
      size: 58mm auto;
      margin: 0;
    }
    body * { visibility: hidden; }
    #receipt-content, #receipt-content * { visibility: visible; }
    #receipt-content {
      position: fixed;
      top: 0;
      left: 0;
      width: 58mm;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 4mm 3mm;
      margin: 0;
      color: #000;
      background: #fff;
    }
    .receipt-header { text-align: center; border-bottom: 1px dashed #999; padding-bottom: 6px; margin-bottom: 6px; }
    .receipt-header h2 { font-size: 12px; letter-spacing: 2px; margin-bottom: 2px; }
    .receipt-header p { font-size: 9px; color: #333; margin: 1px 0; }
    .receipt-line { display: flex; justify-content: space-between; margin: 2px 0; font-size: 10px; }
    .rname { flex: 1; padding-right: 4px; word-break: break-word; }
    .receipt-divider { border: none; border-top: 1px dashed #999; margin: 6px 0; }
    .receipt-total-row { display: flex; justify-content: space-between; font-weight: bold; margin: 2px 0; font-size: 10px; }
    .receipt-grand { font-size: 12px; margin-top: 4px; border-top: 1px solid #000; padding-top: 3px; }
    .receipt-footer { text-align: center; margin-top: 8px; font-size: 9px; color: #555; border-top: 1px dashed #999; padding-top: 6px; }
  }

    document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

    // Service worker for offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const sw = `
          const CACHE = 'keg-crash-kit-v1';
          self.addEventListener('install', e => { self.skipWaiting(); });
          self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
          self.addEventListener('fetch', e => {
            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
          });
        `;
        const swBlob = new Blob([sw], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(e => console.log('SW:', e));
      });
    }

    // Android install prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'flex';
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('install-banner').style.display = 'none';
    });
    function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    }
  </script>

<header>

<div class="tabs" id="tabs"></div>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receipt-modal">

      <button class="btn-print" onclick="printReceipt()">Print</button>
      <button class="btn-close" onclick="closeReceipt()">Close</button>

  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="pw-modal">

    <h3 id="pw-modal-title">Manager Access</h3>

      <button class="btn-cancel" onclick="closePwModal()">Cancel</button>

</div>

<!-- MENU EDITOR MODAL -->
<div class="modal-overlay" id="editor-modal">

</div>

// LOAD MENU from localStorage or use default
function loadMenu() {
  try {
    const saved = localStorage.getItem('keg_menu');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_MENU));
}
function saveMenu() {
  try { localStorage.setItem('keg_menu', JSON.stringify(MENU)); } catch(e) {}
}

// LOAD MISC SAVED ITEMS
function loadMiscItems() {
  try {
    const saved = localStorage.getItem('keg_misc');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [];
}
function saveMiscItems() {
  try { localStorage.setItem('keg_misc', JSON.stringify(miscSavedItems)); } catch(e) {}
}

let MENU = loadMenu();
let miscSavedItems = loadMiscItems();
let currentTable = '1';
let currentTab = Object.keys(MENU)[0];
let orders = { '1': [] };

function confirmTable() {
  const val = document.getElementById('table-number-input').value.trim();
  if (!val) return;
  currentTable = val;
  document.getElementById('current-table').textContent = val;
  if (!orders[val]) orders[val] = [];
  renderOrder();
  toggleTableSelector();
  document.getElementById('table-number-input').value = '';
}
function toggleTableSelector() {
  const el = document.getElementById('table-selector');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
  if (el.style.display === 'flex') setTimeout(() => document.getElementById('table-number-input').focus(), 100);
}

// TABS
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  [...Object.keys(MENU), 'Misc'].forEach(cat => {
    const t = document.createElement('div');
    t.className = 'tab' + (cat === currentTab ? ' active' : '') + (cat === 'Misc' ? ' misc-tab' : '');
    t.textContent = cat === 'Misc' ? '+ Misc' : cat;
    t.onclick = () => switchTab(cat);
    tabsEl.appendChild(t);
  });
}

function switchTab(cat) {
  currentTab = cat;
  buildTabs();
  renderMenu();
}

function renderMenu() {
  const content = document.getElementById('menu-content');
  if (currentTab === 'Misc') {
    renderMiscTab();
    return;
  }
  const items = MENU[currentTab] || [];
  content.innerHTML = `<div class="menu-section"><div class="section-title">${currentTab}</div>${
    items.map(item => `
      <div class="menu-item" onclick="addItem('${escStr(item.name)}', ${item.price}, this.querySelector('.add-btn'))">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        </div>
        <div class="item-price">${item.price === 0 ? 'Incl.' : '$' + item.price}</div>
        <button class="add-btn" onclick="event.stopPropagation();addItem('${escStr(item.name)}', ${item.price}, this)">+</button>
      </div>
    `).join('')
  }</div>`;
}

function handleMenuSearch(query) {
  const clearBtn = document.getElementById('search-clear-btn');
  clearBtn.style.display = query ? 'block' : 'none';
  if (!query.trim()) { renderMenu(); return; }
  const content = document.getElementById('menu-content');
  const q = query.toLowerCase();
  let results = [];
  Object.keys(MENU).forEach(cat => {
    MENU[cat].forEach(item => {
      if (item.name.toLowerCase().includes(q) || (item.desc && item.desc.toLowerCase().includes(q))) {
        results.push({ ...item, cat });
      }
    });
  });
  results.sort((a, b) => a.name.localeCompare(b.name));
  if (results.length === 0) {
    content.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:0.9rem;">No items found</div>';
    return;
  }
  const highlight = (text) => {
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:#b8943f33;color:var(--keg-dark);border-radius:2px">$1</mark>');
  };
  content.innerHTML = `
    <div style="padding:8px 12px 2px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(184,148,63,0.7)">${results.length} result${results.length !== 1 ? 's' : ''}</div>
    <div class="menu-section">
    ${results.map(item => `
      <div class="menu-item" onclick="addItem('${escStr(item.name)}', ${item.price}, this.querySelector('.add-btn'))">
        <div class="item-info">
          <div class="item-name">${highlight(item.name)}</div>
          <div class="item-desc" style="color:var(--keg-gold);font-size:0.68rem">${item.cat}</div>
          ${item.desc ? `<div class="item-desc">${highlight(item.desc)}</div>` : ''}
        </div>
        <div class="item-price">${item.price === 0 ? 'Incl.' : '$' + item.price}</div>
        <button class="add-btn" onclick="event.stopPropagation();addItem('${escStr(item.name)}', ${item.price}, this)">+</button>
      </div>
    `).join('')}
    </div>`;
}

function clearMenuSearch() {
  const input = document.getElementById('menu-search');
  input.value = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  renderMenu();
  input.focus();
}

function addMiscToOrder() {
  const name = document.getElementById('misc-name').value.trim();
  const price = parseFloat(document.getElementById('misc-price').value);
  if (!name) { document.getElementById('misc-name').focus(); return; }
  if (isNaN(price) || price < 0) { document.getElementById('misc-price').focus(); return; }
  addItem(name, price);
  document.getElementById('misc-name').value = '';
  document.getElementById('misc-price').value = '';
}

function saveMiscItem() {
  const name = document.getElementById('misc-name').value.trim();
  const price = parseFloat(document.getElementById('misc-price').value);
  if (!name || isNaN(price) || price < 0) return;
  miscSavedItems.push({ name, price });
  saveMiscItems();
  addItem(name, price);
  document.getElementById('misc-name').value = '';
  document.getElementById('misc-price').value = '';
  renderMiscTab();
}

function deleteMiscItem(idx) {
  miscSavedItems.splice(idx, 1);
  saveMiscItems();
  renderMiscTab();
}

function escStr(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function addItem(name, price, btnEl) {
  const order = orders[currentTable];
  const existing = order.find(i => i.name === name);
  if (existing) { existing.qty++; } else { order.push({ name, price, qty: 1 }); }
  renderOrder();
  if (btnEl) {
    btnEl.classList.add('tapped');
    btnEl.textContent = '✓';
    setTimeout(() => {
      btnEl.classList.remove('tapped');
      btnEl.textContent = '+';
    }, 500);
  }
  if (navigator.vibrate) navigator.vibrate(30);
  const panel = document.getElementById('order-panel');
  panel.style.borderTopColor = '#d4ab5a';
  setTimeout(() => panel.style.borderTopColor = '', 400);
}

function changeQty(name, delta) {
  const order = orders[currentTable];
  const idx = order.findIndex(i => i.name === name);
  if (idx === -1) return;
  order[idx].qty += delta;
  if (order[idx].qty <= 0) order.splice(idx, 1);
  renderOrder();
}

function clearOrder() {
  if (orders[currentTable].length === 0) return;
  const btn = document.querySelector('.clear-btn');
  if (btn.dataset.confirming === 'true') {
    orders[currentTable] = [];
    renderOrder();
    btn.textContent = 'Clear Order';
    btn.style.color = ''; btn.style.borderColor = '';
    btn.dataset.confirming = 'false';
  } else {
    btn.textContent = 'Tap again to confirm clear';
    btn.style.color = '#e74c3c'; btn.style.borderColor = '#e74c3c';
    btn.dataset.confirming = 'true';
    setTimeout(() => {
      btn.textContent = 'Clear Order';
      btn.style.color = ''; btn.style.borderColor = '';
      btn.dataset.confirming = 'false';
    }, 3000);
  }
}

function getOrderTotals() {
  const order = orders[currentTable];
  const subtotal = order.reduce((s, i) => s + i.price * i.qty, 0);
  let compAmount = 0;
  let compLabel = '';
  if (activeComp) {
    if (activeComp.type === 'percent') {
      compAmount = subtotal * (activeComp.value / 100);
      compLabel = activeComp.label;
    } else if (activeComp.type === 'dessert') {
      // Find most expensive dessert item in order
      const dessertNames = (MENU['Desserts'] || []).map(d => d.name.toLowerCase());
      const dessertItems = order.filter(i => dessertNames.includes(i.name.toLowerCase()));
      if (dessertItems.length > 0) {
        const maxDessert = dessertItems.reduce((a, b) => (a.price > b.price ? a : b));
        compAmount = maxDessert.price;
        compLabel = 'Free Dessert (' + maxDessert.name + ')';
      } else {
        compAmount = 0;
        compLabel = 'Free Dessert (no dessert on order)';
      }
    }
  }
  const discountedSubtotal = Math.max(0, subtotal - compAmount);
  const tax = subtotal * TAX_RATE; // Tax on original subtotal, not discounted
  const total = discountedSubtotal + tax;
  return { subtotal, compAmount, compLabel, discountedSubtotal, tax, total };
}

function renderOrder() {
  const order = orders[currentTable];
  const count = order.reduce((s, i) => s + i.qty, 0);
  const { subtotal, tax, total } = getOrderTotals();
  document.getElementById('order-count').textContent = count;
  document.getElementById('order-subtotal-header').textContent = '$' + subtotal.toFixed(2);
  const itemsEl = document.getElementById('order-items');
  itemsEl.innerHTML = order.length === 0
    ? '<div style="color:rgba(245,240,232,0.35);font-size:0.85rem;padding:12px 0;text-align:center;">No items added yet</div>'
    : order.map(item => `
        <div class="order-item">
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${escStr(item.name)}', -1)">−</button>
            <div class="qty-num">${item.qty}</div>
            <button class="qty-btn" onclick="changeQty('${escStr(item.name)}', 1)">+</button>
          </div>
          <div class="order-item-name">${item.name}</div>
          <div class="order-item-price">$${(item.price * item.qty).toFixed(2)}</div>
        </div>
      `).join('');
  const { subtotal: sub2, compAmount, compLabel, discountedSubtotal, tax: tax2, total: total2 } = getOrderTotals();
  document.getElementById('order-totals').innerHTML = `
    <div class="total-row"><span>Subtotal</span><span>$${sub2.toFixed(2)}</span></div>
    ${compAmount > 0 ? `<div class="total-row" style="color:#e74c3c"><span>${compLabel}</span><span>-$${compAmount.toFixed(2)}</span></div>` : ''}
    <div class="total-row"><span>Tax (8.1%)</span><span>$${tax2.toFixed(2)}</span></div>
    <div class="total-row grand"><span>TOTAL</span><span>$${total2.toFixed(2)}</span></div>
  `;
  renderCompSection();
}

function renderCompSection() {
  const el = document.getElementById('comp-section');
  if (!el) return;
  const comps = [
    { type: 'percent', value: 10, label: '10%' },
    { type: 'percent', value: 25, label: '25%' },
    { type: 'percent', value: 40, label: '40%' },
    { type: 'percent', value: 50, label: '50%' },
    { type: 'dessert', value: 0, label: '🍰 Dessert' },
  ];
  const activeRow = activeComp ? `
    <div class="comp-active-row">
      <span class="comp-active-label">✓ ${activeComp.label} applied</span>
      <button class="comp-remove" onclick="removeComp()">Remove ✕</button>
    </div>` : '';
  el.innerHTML = `
    <div class="comp-label">Manager Comp</div>
    <div class="comp-buttons">
      ${comps.map(c => `
        <button class="comp-btn ${c.type === 'dessert' ? 'dessert-btn' : ''} ${activeComp && activeComp.label === (c.type === 'percent' ? c.label + ' Comp' : 'Free Dessert') ? 'active' : ''}"
          onclick="applyComp('${c.type}', ${c.value}, '${c.type === 'percent' ? c.label + ' Comp' : 'Free Dessert'}')">${c.label}</button>
      `).join('')}
    </div>
    ${activeRow}
  `;
}

let pendingComp = null;

function applyComp(type, value, label) {
  // If already active and tapping same one, remove without password
  if (activeComp && activeComp.label === label) {
    activeComp = null;
    renderOrder();
    return;
  }
  // Require password to apply a new comp
  pendingComp = { type, value, label };
  openCompPwModal();
}

function openCompPwModal() {
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-modal-title').textContent = 'Manager Approval';
  document.getElementById('pw-modal-subtitle').textContent = 'Enter password to apply comp';
  document.getElementById('pw-modal').classList.add('open');
  document.getElementById('pw-modal').dataset.mode = 'comp';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function removeComp() {
  activeComp = null;
  renderOrder();
}

function toggleOrder() {
  document.getElementById('order-panel').classList.toggle('collapsed');
}

// PASSWORD GATE
function openEditorGate() {
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-modal-title').textContent = 'Manager Access';
  document.getElementById('pw-modal-subtitle').textContent = 'Enter password to edit menu';
  document.getElementById('pw-modal').dataset.mode = 'editor';
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}
function closePwModal() {
  document.getElementById('pw-modal').classList.remove('open');
}
function checkPw() {
  const val = document.getElementById('pw-input').value;
  const mode = document.getElementById('pw-modal').dataset.mode || 'editor';
  if (val === EDITOR_PASSWORD) {
    closePwModal();
    if (mode === 'comp') {
      activeComp = pendingComp;
      pendingComp = null;
      renderOrder();
      if (navigator.vibrate) navigator.vibrate(20);
    } else {
      openEditor();
    }
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password. Try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

          </div>
          <input class="editor-price-input" type="number" value="${item.price}" min="0" step="0.01"
            onchange="updatePrice('${escStr(cat)}', ${idx}, this.value)" placeholder="$">
          <button class="editor-del-btn" onclick="deleteMenuItem('${escStr(cat)}', ${idx})">✕</button>
        </div>`;
      });
    }
  } else {
    // Normal view — sorted categories, items alphabetical within each
    const sortedCats = Object.keys(MENU).sort();
    sortedCats.forEach(cat => {
      const sortedItems = [...MENU[cat]].map((item, origIdx) => ({ item, origIdx }))
        .sort((a, b) => a.item.name.localeCompare(b.item.name));
      html += `<div class="editor-cat">
        <div class="editor-cat-title">${cat}</div>
        ${sortedItems.map(({ item, origIdx }) => `
          <div class="editor-item-row">
            <div class="editor-item-name">${item.name}</div>
            <input class="editor-price-input" type="number" value="${item.price}" min="0" step="0.01"
              onchange="updatePrice('${escStr(cat)}', ${origIdx}, this.value)" placeholder="$">
            <button class="editor-del-btn" onclick="deleteMenuItem('${escStr(cat)}', ${origIdx})">✕</button>
          </div>
        `).join('')}
        <div class="add-item-row">
          <input class="add-item-name-input" type="text" id="new-name-${escStr(cat)}" placeholder="New item name">
          <input class="add-item-price-input" type="number" id="new-price-${escStr(cat)}" placeholder="$0" min="0" step="0.01">
          <button class="add-item-btn" onclick="addMenuItem('${escStr(cat)}')">+</button>
        </div>
      </div>`;
    });
  }

  html += `</div>
    <div style="padding:0 16px 8px">
      <button class="editor-save-btn" onclick="saveEditorChanges()">💾 Save All Changes</button>
      <div class="editor-saved-msg" id="editor-saved-msg"></div>
    </div>
  `;
  body.innerHTML = html;
  // Refocus search if was searching
  if (q) {
    const inp = body.querySelector('.editor-search-input');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

function updatePrice(cat, idx, val) {
  const price = parseFloat(val);
  if (!isNaN(price) && price >= 0) MENU[cat][idx].price = price;
}

function deleteMenuItem(cat, idx) {
  MENU[cat].splice(idx, 1);
  renderEditor();
}

function addMenuItem(cat) {
  const nameEl = document.getElementById('new-name-' + cat);
  const priceEl = document.getElementById('new-price-' + cat);
  const name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);
  if (!name || isNaN(price) || price < 0) return;
  MENU[cat].push({ name, price, desc: '' });
  renderEditor();
}

function saveEditorChanges() {
  saveMenu();
  buildTabs();
  renderMenu();
  document.getElementById('editor-saved-msg').textContent = '✓ Menu saved successfully!';
  setTimeout(() => document.getElementById('editor-saved-msg').textContent = '', 3000);
}

// ── Direct Bluetooth Printing (ESC/POS for Rongta RPP300) ──
let btDevice = null;
let btCharacteristic = null;

// ESC/POS helper
function escpos(lines) {
  const ESC = 0x1B, GS = 0x1D;
  const enc = new TextEncoder();
  const chunks = [];

  const cmd = (...bytes) => chunks.push(new Uint8Array(bytes));
  const txt = (s) => chunks.push(enc.encode(s));
  const nl = () => chunks.push(new Uint8Array([0x0A]));

  // Init printer
  cmd(ESC, 0x40);
  // Set left margin to center on 58mm paper
  cmd(GS, 0x4C, 0x08, 0x00);
  // Set print area width
  cmd(GS, 0x57, 0x38, 0x01);
  // Set font size normal
  cmd(ESC, 0x21, 0x00);

  for (const line of lines) {
    if (line.type === 'init') {
      cmd(ESC, 0x40);
    } else if (line.type === 'center') {
      cmd(ESC, 0x61, 0x01);
      if (line.bold) cmd(ESC, 0x45, 0x01);
      if (line.big) cmd(GS, 0x21, 0x11);
      txt(line.text);
      nl();
      if (line.big) cmd(GS, 0x21, 0x00);
      if (line.bold) cmd(ESC, 0x45, 0x00);
      cmd(ESC, 0x61, 0x00);
    } else if (line.type === 'left') {
      cmd(ESC, 0x61, 0x00);
      if (line.bold) cmd(ESC, 0x45, 0x01);
      txt(line.text);
      nl();
      if (line.bold) cmd(ESC, 0x45, 0x00);
    } else if (line.type === 'row') {
      // Two column row - left and right aligned
      cmd(ESC, 0x61, 0x00);
      if (line.bold) cmd(ESC, 0x45, 0x01);
      const totalWidth = 32;
      const left = line.left || '';
      const right = line.right || '';
      const spaces = Math.max(1, totalWidth - left.length - right.length);
      txt(left + ' '.repeat(spaces) + right);
      nl();
      if (line.bold) cmd(ESC, 0x45, 0x00);
    } else if (line.type === 'divider') {
      txt('-'.repeat(32));
      nl();
    } else if (line.type === 'feed') {
      for (let i = 0; i < (line.lines || 3); i++) nl();
    } else if (line.type === 'cut') {
      cmd(GS, 0x56, 0x41, 0x03);
    }
  }

  // Feed and cut
  cmd(0x0A, 0x0A, 0x0A);
  cmd(GS, 0x56, 0x41, 0x03);

  // Merge all chunks
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const result = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { result.set(c, offset); offset += c.length; }
  return result;
}

async function printReceipt() {
  const order = orders[currentTable];
  if (order.length === 0) return;
  const { subtotal, compAmount, compLabel, tax, total } = getOrderTotals();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  // Build receipt lines
  const lines = [
    { type: 'center', text: 'THE KEG', bold: true, big: true },
    { type: 'center', text: 'STEAKHOUSE + BAR' },
    { type: 'center', text: 'CHANDLER, ARIZONA' },
    { type: 'center', text: '3065 W Chandler Blvd' },
    { type: 'divider' },
    { type: 'center', text: dateStr + '  ' + timeStr },
    { type: 'center', text: 'TABLE ' + currentTable, bold: true },
    { type: 'divider' },
  ];

  for (const item of order) {
    const name = (item.qty > 1 ? item.qty + 'x ' : '') + item.name;
    const price = '$' + (item.price * item.qty).toFixed(2);
    // Truncate name if too long
    const maxName = 32 - price.length - 1;
    const displayName = name.length > maxName ? name.substring(0, maxName - 1) + '.' : name;
    lines.push({ type: 'row', left: displayName, right: price });
  }

  lines.push({ type: 'divider' });
  lines.push({ type: 'row', left: 'Subtotal', right: '$' + subtotal.toFixed(2) });
  if (compAmount > 0) {
    lines.push({ type: 'row', left: compLabel.substring(0, 20), right: '-$' + compAmount.toFixed(2) });
  }
  lines.push({ type: 'row', left: 'Tax (8.1%)', right: '$' + tax.toFixed(2) });
  lines.push({ type: 'divider' });
  lines.push({ type: 'row', left: 'TOTAL', right: '$' + total.toFixed(2), bold: true });
  lines.push({ type: 'divider' });
  lines.push({ type: 'center', text: 'Thank you for dining with us!' });
  lines.push({ type: 'center', text: '* Itemized Receipt *' });
  lines.push({ type: 'feed', lines: 4 });

  const data = escpos(lines);

  // Check if Web Bluetooth is supported
  if (!navigator.bluetooth) {
    alert('Web Bluetooth not supported on this browser. Please use Chrome on Android.');
    return;
  }

  try {
    const printBtn = document.querySelector('.receipt-actions .btn-print') || document.querySelector('.print-btn');
    if (printBtn) { printBtn.textContent = 'Connecting...'; printBtn.disabled = true; }

    // Connect to printer if not already connected
    if (!btDevice || !btDevice.gatt.connected) {
      btDevice = await navigator.bluetooth.requestDevice({
        filters: [
          { name: 'RPP300-8082' },
          { namePrefix: 'RPP300' },
          { namePrefix: 'Rongta' },
        ],
        optionalServices: [
          '000018f0-0000-1000-8000-00805f9b34fb', // Common BT printer service
          '00001101-0000-1000-8000-00805f9b34fb', // Serial Port Profile
          'e7810a71-73ae-499d-8c15-faa9aef0c3f2', // Alternative printer service
        ]
      });

      const server = await btDevice.gatt.connect();

      // Try common printer services
      let service = null;
      const serviceUUIDs = [
        '000018f0-0000-1000-8000-00805f9b34fb',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '00001101-0000-1000-8000-00805f9b34fb',
      ];

      for (const uuid of serviceUUIDs) {
        try {
          service = await server.getPrimaryService(uuid);
          if (service) break;
        } catch(e) { continue; }
      }

      if (!service) {
        // Get all services and try the first one
        const services = await server.getPrimaryServices();
        if (services.length > 0) service = services[0];
      }

      if (!service) throw new Error('No printer service found');

      // Get write characteristic
      const characteristics = await service.getCharacteristics();
      btCharacteristic = null;
      for (const c of characteristics) {
        if (c.properties.write || c.properties.writeWithoutResponse) {
          btCharacteristic = c;
          break;
        }
      }

      if (!btCharacteristic) throw new Error('No write characteristic found');
    }

    if (printBtn) printBtn.textContent = 'Printing...';

    // Send data in chunks of 64 bytes with longer delay for RPP300
    const chunkSize = 64;
    for (let i = 0; i < data.length; i += chunkSize) {
      const chunk = data.slice(i, i + chunkSize);
      try {
        await btCharacteristic.writeValueWithoutResponse(chunk);
      } catch(e) {
        await btCharacteristic.writeValue(chunk);
      }
      await new Promise(r => setTimeout(r, 120));
    }

    if (printBtn) { printBtn.textContent = '✓ Printed!'; printBtn.disabled = false; }
    setTimeout(() => {
      if (printBtn) printBtn.textContent = 'Print';
    }, 2000);

  } catch(err) {
    console.error('BT Print error:', err);
    btDevice = null;
    btCharacteristic = null;

    // Fall back to browser print dialog
    const msg = err.message || '';
    if (msg.includes('cancelled') || msg.includes('chosen')) {
      // User cancelled - do nothing
    } else {
      if (confirm('Bluetooth print failed: ' + msg + '\n\nFall back to browser print dialog?')) {
        window.print();
      }
    }

    const printBtn = document.querySelector('.receipt-actions .btn-print') || document.querySelector('.print-btn');
    if (printBtn) { printBtn.textContent = 'Print'; printBtn.disabled = false; }
  }
}

function closeReceipt() { document.getElementById('receipt-modal').classList.remove('open'); }
